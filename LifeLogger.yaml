AWSTemplateFormatVersion: '2010-09-09'
Description: 'LifeLogger AI - Routine & Reminders Assistant with Full CRUD operations and Timezone Support'

Parameters:
  TelegramBotToken:
    Type: String
    Description: 'Token received from BotFather'
    NoEcho: true
  UserMappingJson:
    Type: String
    Description: 'JSON mapping of TG Chat IDs to user roles, e.g., {"12345": "Admin", "67890": "Partner"}'
    Default: '{"YOUR_ID": "Admin", "WIFE_ID": "Partner"}'
  KidsMappingJson:
    Type: String
    Description: 'JSON mapping of primary child names to their aliases'
    Default: '{"Son": ["son", "boy", "kiddo", "junior"], "Daughter": ["daughter", "girl", "princess", "sweetheart"]}'
  UserTimeZone:
    Type: String
    Description: 'User timezone for the LLM to calculate relative dates correctly'
    Default: 'Australia/Melbourne'

Resources:
  # 1. DynamoDB Table
  EventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-EventsTable'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: UserId
          AttributeType: S
        - AttributeName: Timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: UserId
          KeyType: HASH
        - AttributeName: Timestamp
          KeyType: RANGE

  # 2. IAM Role for EventBridge Scheduler to trigger Notifier Lambda
  SchedulerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeNotifierPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt NotifierLambda.Arn

  # 3. Notifier Lambda (Triggered by EventBridge)
  NotifierLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  NotifierLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-Notifier'
      Handler: index.lambda_handler
      Role: !GetAtt NotifierLambdaRole.Arn
      Runtime: python3.12
      Timeout: 10
      Environment:
        Variables:
          TELEGRAM_TOKEN: !Ref TelegramBotToken
      Code:
        # language=python
        ZipFile: |
          import json, os, urllib.request
          def lambda_handler(event, context):
              token = os.environ['TELEGRAM_TOKEN']
              chat_id = event.get('chat_id')
              text = event.get('message', '⏰ Reminder!')
              if not chat_id or not text: return
              
              url = f"https://api.telegram.org/bot{token}/sendMessage"
              payload = json.dumps({'chat_id': chat_id, 'text': text}).encode('utf-8')
              req = urllib.request.Request(url, data=payload, headers={'Content-Type': 'application/json'})
              try:
                  urllib.request.urlopen(req)
                  print(f"Sent to {chat_id}")
              except Exception as e:
                  print(f"Error: {e}")

  # 4. Action Group Lambda (Executor)
  ActionGroupRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoAndSchedulerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:Query
                  - dynamodb:DeleteItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt EventsTable.Arn
              - Effect: Allow
                Action:
                  - scheduler:CreateSchedule
                Resource: !Sub 'arn:aws:scheduler:${AWS::Region}:${AWS::AccountId}:schedule/default/*'
              - Effect: Allow
                Action: iam:PassRole
                Resource: !GetAtt SchedulerExecutionRole.Arn

  ActionGroupLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-ActionHandler'
      Handler: index.lambda_handler
      Role: !GetAtt ActionGroupRole.Arn
      Runtime: python3.12
      Timeout: 15
      Environment:
        Variables:
          TABLE_NAME: !Ref EventsTable
          NOTIFIER_ARN: !GetAtt NotifierLambda.Arn
          SCHEDULER_ROLE_ARN: !GetAtt SchedulerExecutionRole.Arn
          USER_MAPPING: !Ref UserMappingJson
          KIDS_MAPPING: !Ref KidsMappingJson
          USER_TIMEZONE: !Ref UserTimeZone
      Code:
        # language=python
        ZipFile: |
          import json, os, boto3, datetime
          from zoneinfo import ZoneInfo
          from boto3.dynamodb.conditions import Key
          
          dynamodb = boto3.resource('dynamodb')
          scheduler = boto3.client('scheduler')
          
          def lambda_handler(event, context):
              table_name = os.environ['TABLE_NAME']
              notifier_arn = os.environ['NOTIFIER_ARN']
              role_arn = os.environ['SCHEDULER_ROLE_ARN']
              
              user_map = json.loads(os.environ.get('USER_MAPPING', '{}'))
              kids_map = json.loads(os.environ.get('KIDS_MAPPING', '{}'))
              
              # Set up local timezone
              tz_str = os.environ.get('USER_TIMEZONE', 'UTC')
              try:
                  local_tz = ZoneInfo(tz_str)
              except:
                  local_tz = datetime.timezone.utc
                  
              table = dynamodb.Table(table_name)
              session_id = event.get('sessionId', 'unknown')
              caller_name = user_map.get(session_id, 'User')
              
              func = event.get('function', '')
              params = {p['name']: p['value'] for p in event.get('parameters', [])}
              resp = ""
              
              def resolve_target(raw_target):
                  if not raw_target: return session_id
                  t_lower = raw_target.lower().strip()
                  for main_name, aliases in kids_map.items():
                      if t_lower == main_name.lower() or t_lower in [a.lower().strip() for a in aliases]:
                          return main_name
                  return session_id
                  
              def check_security(db_target):
                  shared_kids = list(kids_map.keys())
                  return db_target == session_id or db_target in shared_kids
              
              try:
                  if func == 'log_event':
                      raw_target = params.get('target_id', session_id)
                      db_target = resolve_target(raw_target)
                      category = params.get('category', 'routine').lower()
                      desc = params.get('description', '')
                      
                      # Always write timezone-aware UTC
                      ts = datetime.datetime.now(datetime.timezone.utc).isoformat()
                      
                      table.put_item(Item={
                          'UserId': db_target,
                          'Timestamp': ts,
                          'EventText': desc,
                          'Category': category,
                          'CreatedBy': caller_name
                      })
                      resp = f'Saved: "User - {db_target}, Event - {desc}, Category - {category}, Time (UTC) - {ts}"'
                      
                  elif func == 'delete_event':
                      raw_target = params.get('target_id', session_id)
                      db_target = resolve_target(raw_target)
                      timestamp = params.get('timestamp', '')
                      
                      if not check_security(db_target):
                          return respond(event, "Access denied.")
                          
                      table.delete_item(Key={'UserId': db_target, 'Timestamp': timestamp})
                      resp = f"Event from {timestamp} successfully deleted."

                  elif func == 'update_event':
                      raw_target = params.get('target_id', session_id)
                      db_target = resolve_target(raw_target)
                      timestamp = params.get('timestamp', '')
                      new_desc = params.get('new_description', '')
                      new_cat = params.get('new_category', '').lower()
                      
                      if not check_security(db_target):
                          return respond(event, "Access denied.")
                          
                      update_expr = "set EventText = :d"
                      expr_attrs = {':d': new_desc}
                      if new_cat:
                          update_expr += ", Category = :c"
                          expr_attrs[':c'] = new_cat
                          
                      table.update_item(
                          Key={'UserId': db_target, 'Timestamp': timestamp},
                          UpdateExpression=update_expr,
                          ExpressionAttributeValues=expr_attrs
                      )
                      resp = f"Event from {timestamp} successfully updated to: {new_desc} [{new_cat}]"

                  elif func == 'schedule_reminder':
                      raw_target = params.get('target_id', session_id)
                      db_target = resolve_target(raw_target)
                      desc = params.get('description', '')
                      time_iso = params.get('time_iso', '') 
                      safe_name = f"rem_{session_id}_{int(datetime.datetime.now().timestamp())}"
                      
                      scheduler.create_schedule(
                          Name=safe_name,
                          ScheduleExpression=f"at({time_iso})",
                          FlexibleTimeWindow={'Mode': 'OFF'},
                          ActionAfterCompletion='DELETE',
                          Target={
                              'Arn': notifier_arn,
                              'RoleArn': role_arn,
                              'Input': json.dumps({'chat_id': session_id, 'message': f"🔔 Reminder: {desc}"})
                          }
                      )
                      
                      ts = datetime.datetime.now(datetime.timezone.utc).isoformat()
                      table.put_item(Item={
                          'UserId': db_target,
                          'Timestamp': ts,
                          'EventText': f"[REMINDER SET] {desc}",
                          'Category': 'reminder',
                          'CreatedBy': caller_name,
                          'ReminderTime': time_iso
                      })
                      resp = f'Saved Reminder: "User - {db_target}, Reminder - {desc}, Time - {time_iso} UTC"'
                      
                  elif func == 'get_events_history':
                      raw_target = params.get('target_id', session_id)
                      db_target = resolve_target(raw_target)
                      days = int(params.get('days', '7'))
                      
                      if not check_security(db_target):
                           return respond(event, "Access denied.")
                           
                      start_time = (datetime.datetime.now(datetime.timezone.utc) - datetime.timedelta(days=days)).isoformat()
                      db_resp = table.query(
                          KeyConditionExpression=Key('UserId').eq(db_target) & Key('Timestamp').gte(start_time)
                      )
                      
                      items = db_resp.get('Items', [])
                      if not items:
                          resp = "No records found."
                      else:
                          clean_items = []
                          for i in items:
                              raw_ts = i['Timestamp']
                              try:
                                  # Convert UTC timestamp to local time for the Agent response
                                  utc_dt = datetime.datetime.fromisoformat(raw_ts.replace('Z', '+00:00'))
                                  if utc_dt.tzinfo is None:
                                      utc_dt = utc_dt.replace(tzinfo=datetime.timezone.utc)
                                  local_ts = utc_dt.astimezone(local_tz).isoformat()
                              except Exception:
                                  # Fallback if format is invalid
                                  local_ts = raw_ts 
                                  
                              clean_items.append({
                                  'time': local_ts,
                                  'original_utc_key': raw_ts, # Save original UTC key in case LLM needs to delete or update the record
                                  'event': i['EventText'],
                                  'category': i.get('Category', ''),
                                  'added_by': i.get('CreatedBy')
                              })
                          resp = json.dumps(clean_items, ensure_ascii=False)
                          
                  else:
                      resp = "Unknown function."
                      
              except Exception as e:
                  resp = f"DB/API Error: {str(e)}"
                  
              return respond(event, resp)
              
          def respond(event, text):
              return {
                  "messageVersion": "1.0",
                  "response": {
                      "actionGroup": event.get('actionGroup', ''),
                      "function": event.get('function', ''),
                      "functionResponse": {"responseBody": {"TEXT": {"body": text}}}
                  }
              }

  BedrockInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt ActionGroupLambda.Arn
      Action: lambda:InvokeFunction
      Principal: bedrock.amazonaws.com

  # 5. Bedrock Agent Service Role
  BedrockAgentServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockAgentAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['bedrock:InvokeModel']
                Resource: !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/openai.gpt-oss-120b-1:0'
              - Effect: Allow
                Action: ['lambda:InvokeFunction']
                Resource: !GetAtt ActionGroupLambda.Arn

  # 6. Bedrock Agent
  LifeLoggerAgent:
    Type: AWS::Bedrock::Agent
    Properties:
      AgentName: !Sub '${AWS::StackName}-Agent'
      AgentResourceRoleArn: !GetAtt BedrockAgentServiceRole.Arn
      FoundationModel: openai.gpt-oss-120b-1:0
      IdleSessionTTLInSeconds: 3600
      AutoPrepare: true
      Instruction: !Sub |
        You are an AI assistant for life logging (LifeLogger).
        
        CRITICAL RULES:
        1. NEVER end your responses with a question.
        2. NEVER ask the user to clarify missing parameters. Infer them from the context.
        3. If a user inputs a statement like "I drank vitamins", log it immediately. 
        
        TARGET EXTRACTION (CRITICAL):
        You MUST analyze the input to determine the subject of the event:
        - If the user talks about themselves (e.g., "I", "my", or implies their own action), pass their sessionId to the target_id parameter.
        - If the user mentions someone else by name or relation (e.g., "son", "Billy", "Ваня", "daughter", "kiddo"), you MUST pass THAT EXACT WORD as the target_id. Do NOT pass the sessionId.
        
        TIMEZONE & REMINDERS (CRITICAL):
        The user is located in the timezone: ${UserTimeZone}.
        Calculate the target date/time in the user's LOCAL timezone first, then convert it strictly into UTC format "YYYY-MM-DDThh:mm:ss" before calling schedule_reminder.
        
        UPDATE AND DELETE PROTOCOL (CRITICAL):
        If the user asks to modify or delete a previously saved event:
        1. If you don't have the exact timestamp, YOU MUST call get_events_history FIRST to find the EXACT 'original_utc_key' of the target event.
        2. Once you have it, call delete_event or update_event passing it as the 'timestamp'. NEVER guess the timestamp.
        
        CATEGORIZATION PROTOCOL:
        Assign a category automatically:
        - 'health': physiology, nutrition, stool, pills, sleep, pain.
        - 'bike': bicycles, tires, sealant, gear.
        - 'maintenance': Tech, house repairs, car.
        - 'routine': General daily tasks.
        
        RESPONSE FORMATTING:
        When log_event returns a string starting with "Saved: ...", echo that EXACT string back to the user.
      ActionGroups:
        - ActionGroupName: !Sub '${AWS::StackName}-Actions'
          ActionGroupState: ENABLED
          ActionGroupExecutor:
            Lambda: !GetAtt ActionGroupLambda.Arn
          FunctionSchema:
            Functions:
              - Name: log_event
                Description: 'Saves an event to the database.'
                Parameters:
                  target_id: { Type: string, Description: 'If about user, pass sessionId. If about a child/other, pass the exact name used (e.g., "Ваня", "son").', Required: true }
                  category: { Type: string, Description: 'Inferred category', Required: true }
                  description: { Type: string, Description: 'Event description', Required: true }
              - Name: delete_event
                Description: 'Deletes an event from the database.'
                Parameters:
                  target_id: { Type: string, Description: 'If about user, pass sessionId. If about a child/other, pass the exact name used.', Required: true }
                  timestamp: { Type: string, Description: 'EXACT original_utc_key of the event to delete', Required: true }
              - Name: update_event
                Description: 'Updates an existing event.'
                Parameters:
                  target_id: { Type: string, Description: 'If about user, pass sessionId. If about a child/other, pass the exact name used.', Required: true }
                  timestamp: { Type: string, Description: 'EXACT original_utc_key of the event to update', Required: true }
                  new_description: { Type: string, Description: 'New description text', Required: true }
                  new_category: { Type: string, Description: 'New category', Required: false }
              - Name: schedule_reminder
                Description: 'Sets a scheduled reminder.'
                Parameters:
                  target_id: { Type: string, Description: 'If about user, pass sessionId. If about a child/other, pass the exact name used.', Required: true }
                  time_iso: { Type: string, Description: 'Trigger time in UTC (YYYY-MM-DDThh:mm:ss)', Required: true }
                  description: { Type: string, Description: 'Reminder text', Required: true }
              - Name: get_events_history
                Description: 'Retrieves event history.'
                Parameters:
                  target_id: { Type: string, Description: 'If about user, pass sessionId. If about a child/other, pass the exact name used.', Required: true }
                  days: { Type: string, Description: 'Number of recent days to query', Required: false }

  # 7. Webhook Lambda Role
  TelegramWebhookRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockInvokeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeAgent
                Resource: "*"

  # 8. Webhook Lambda
  TelegramWebhookLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-Webhook'
      Handler: index.lambda_handler
      Role: !GetAtt TelegramWebhookRole.Arn
      Runtime: python3.12
      Timeout: 60
      Environment:
        Variables:
          TELEGRAM_TOKEN: !Ref TelegramBotToken
          USER_MAPPING: !Ref UserMappingJson
          AGENT_ID: !Ref LifeLoggerAgent
          AGENT_ALIAS_ID: 'TSTALIASID'
      Code:
        # language=python
        ZipFile: |
          import json, os, boto3, urllib.request
          
          bedrock_agent = boto3.client('bedrock-agent-runtime')
          
          def send_message(token, chat_id, text):
              if not text.strip(): return
              url = f"https://api.telegram.org/bot{token}/sendMessage"
              payload = json.dumps({'chat_id': chat_id, 'text': text}).encode('utf-8')
              req = urllib.request.Request(url, data=payload, headers={'Content-Type': 'application/json'})
              try: urllib.request.urlopen(req)
              except Exception as e: print(f"TG Error: {e}")

          def lambda_handler(event, context):
              tg_token = os.environ['TELEGRAM_TOKEN']
              agent_id = os.environ['AGENT_ID']
              agent_alias_id = os.environ['AGENT_ALIAS_ID']
              
              try:
                  user_map = json.loads(os.environ.get('USER_MAPPING', '{}'))
                  allowed_chats = list(user_map.keys())
              except:
                  return {'statusCode': 200, 'body': 'Mapping Error'}

              try:
                  body = json.loads(event.get('body', '{}'))
                  if 'message' not in body: return {'statusCode': 200, 'body': 'OK'}

                  chat_id = str(body['message']['chat']['id'])
                  if chat_id not in allowed_chats:
                      print(f"Access denied: {chat_id}")
                      return {'statusCode': 200, 'body': 'OK'}

                  user_text = body['message'].get('text', '')
                  
                  if user_text.strip() == '/new':
                      bedrock_agent.invoke_agent(agentId=agent_id, agentAliasId=agent_alias_id, sessionId=chat_id, inputText="End session", endSession=True)
                      send_message(tg_token, chat_id, "Context cleared.")
                      return {'statusCode': 200, 'body': 'OK'}

                  if user_text:
                      response = bedrock_agent.invoke_agent(
                          agentId=agent_id, 
                          agentAliasId=agent_alias_id,
                          sessionId=chat_id, 
                          inputText=user_text
                      )
                      completion = ""
                      for stream_event in response.get('completion', []):
                          if 'chunk' in stream_event:
                              completion += stream_event['chunk']['bytes'].decode('utf-8')
                      send_message(tg_token, chat_id, completion)

              except Exception as e:
                  print(f"Lambda Error: {e}")
                  
              return {'statusCode': 200, 'body': 'OK'}

  # 9. API Gateway for Webhook
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties: { Name: !Sub '${AWS::StackName}-Gateway', ProtocolType: HTTP }
  LambdaIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties: { ApiId: !Ref HttpApi, IntegrationType: AWS_PROXY, IntegrationUri: !GetAtt TelegramWebhookLambda.Arn, PayloadFormatVersion: '2.0' }
  HttpApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref HttpApi, RouteKey: 'POST /webhook', Target: !Join ['/', ['integrations', !Ref LambdaIntegration]] }
  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties: { ApiId: !Ref HttpApi, StageName: prod, AutoDeploy: true }
  ApiGatewayInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt TelegramWebhookLambda.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/webhook'

Outputs:
  WebhookUrl:
    Value: !Join ['', [!GetAtt HttpApi.ApiEndpoint, '/prod/webhook']]